<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Easy Go 單字王</title>
  <style>
    /* ===== CSS Reset ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== CSS Variables ===== */
    :root {
      --primary: #4A90D9;
      --primary-light: #6BA3E0;
      --primary-dark: #3A7BC8;
      --secondary: #5BC0A0;
      --secondary-light: #7AD4B8;
      --secondary-dark: #4AAF8F;
      --accent: #FF8C42;
      --accent-light: #FFA366;
      --accent-dark: #E67A30;
      --danger: #E74C3C;
      --danger-light: #EC7063;
      --success: #2ECC71;
      --success-light: #58D68D;
      --bg: #F0F4FF;
      --bg-warm: #FFF8F0;
      --card-bg: #FFFFFF;
      --text: #2C3E50;
      --text-light: #7F8C8D;
      --text-lighter: #BDC3C7;
      --radius: 16px;
      --radius-sm: 10px;
      --radius-xs: 6px;
      --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
      --font-size-xl: 2rem;
      --font-size-lg: 1.5rem;
      --font-size-md: 1.1rem;
      --font-size-sm: 0.9rem;
      --font-size-xs: 0.75rem;
      --transition: all 0.25s ease;
    }

    /* ===== Body & App Container ===== */
    body {
      background-color: var(--bg);
      font-family: "Noto Sans TC", "Rounded Mplus 1c", -apple-system, BlinkMacSystemFont,
        "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      font-size: var(--font-size-md);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
      position: relative;
    }

    /* ===== Page Switching ===== */
    .page {
      display: none;
    }

    .page.active {
      display: block;
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ===== Shared Button Styles ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      font-size: var(--font-size-md);
      font-weight: 700;
      font-family: inherit;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: var(--transition);
      text-decoration: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Primary Button */
    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff;
      box-shadow: 0 4px 12px rgba(74, 144, 217, 0.35);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--primary-light), var(--primary));
      box-shadow: 0 6px 18px rgba(74, 144, 217, 0.45);
      transform: translateY(-2px);
    }

    /* Accent Button */
    .btn-accent {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      box-shadow: 0 4px 12px rgba(255, 140, 66, 0.35);
    }

    .btn-accent:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      box-shadow: 0 6px 18px rgba(255, 140, 66, 0.45);
      transform: translateY(-2px);
    }

    /* Secondary Button */
    .btn-secondary {
      background: linear-gradient(135deg, var(--secondary), var(--secondary-dark));
      color: #fff;
      box-shadow: 0 4px 12px rgba(91, 192, 160, 0.35);
    }

    .btn-secondary:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--secondary-light), var(--secondary));
      box-shadow: 0 6px 18px rgba(91, 192, 160, 0.45);
      transform: translateY(-2px);
    }

    /* Danger Button */
    .btn-danger {
      background: linear-gradient(135deg, var(--danger), #C0392B);
      color: #fff;
      box-shadow: 0 4px 12px rgba(231, 76, 60, 0.35);
    }

    .btn-danger:hover:not(:disabled) {
      background: linear-gradient(135deg, var(--danger-light), var(--danger));
      box-shadow: 0 6px 18px rgba(231, 76, 60, 0.45);
      transform: translateY(-2px);
    }

    /* Outline / Ghost Button */
    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 2.5px solid var(--primary);
    }

    .btn-outline:hover:not(:disabled) {
      background: var(--primary);
      color: #fff;
      transform: translateY(-2px);
    }

    /* Size Variants */
    .btn-lg {
      padding: 16px 36px;
      font-size: var(--font-size-lg);
      border-radius: 20px;
    }

    .btn-sm {
      padding: 8px 16px;
      font-size: var(--font-size-sm);
      border-radius: var(--radius-sm);
    }

    .btn-xs {
      padding: 5px 12px;
      font-size: var(--font-size-xs);
      border-radius: var(--radius-xs);
    }

    /* Block Button (full width) */
    .btn-block {
      display: flex;
      width: 100%;
    }

    /* ===== Card Styles ===== */
    .card {
      background: var(--card-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      transition: var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
    }

    /* ===== Progress Bar ===== */
    .progress-bar {
      width: 100%;
      height: 14px;
      background: #E8ECF1;
      border-radius: 99px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      transition: width 0.4s ease;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 4px;
      right: 4px;
      height: 4px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 99px;
    }

    /* ===== Badge / Tag ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      font-size: var(--font-size-xs);
      font-weight: 700;
      border-radius: 99px;
      color: #fff;
    }

    .badge-primary { background: var(--primary); }
    .badge-accent { background: var(--accent); }
    .badge-secondary { background: var(--secondary); }
    .badge-danger { background: var(--danger); }
    .badge-success { background: var(--success); }

    /* ===== Utility Classes ===== */
    .text-center { text-align: center; }
    .text-light { color: var(--text-light); }
    .text-primary { color: var(--primary); }
    .text-accent { color: var(--accent); }
    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }

    .mt-1 { margin-top: 8px; }
    .mt-2 { margin-top: 16px; }
    .mt-3 { margin-top: 24px; }
    .mb-1 { margin-bottom: 8px; }
    .mb-2 { margin-bottom: 16px; }
    .mb-3 { margin-bottom: 24px; }
    .gap-1 { gap: 8px; }
    .gap-2 { gap: 16px; }

    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .justify-between { justify-content: space-between; }

    /* ===== Emoji Decorators ===== */
    .emoji {
      font-size: 2.5rem;
      line-height: 1;
    }

    .emoji-lg {
      font-size: 4rem;
      line-height: 1;
    }

    /* ===== Input Styles ===== */
    input[type="text"],
    input[type="number"],
    select {
      font-family: inherit;
      font-size: var(--font-size-md);
      padding: 12px 16px;
      border: 2.5px solid #E0E6ED;
      border-radius: var(--radius-sm);
      background: #fff;
      color: var(--text);
      transition: var(--transition);
      width: 100%;
    }

    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.15);
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      :root {
        --font-size-xl: 1.6rem;
        --font-size-lg: 1.25rem;
        --font-size-md: 1rem;
      }

      #app {
        padding: 12px;
      }

      .btn-lg {
        padding: 14px 28px;
        font-size: var(--font-size-lg);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="page-home" class="page active">首頁</section>
    <section id="page-practice-select" class="page">練習-選字</section>
    <section id="page-practice-type" class="page">練習-題型</section>
    <section id="page-practice-game" class="page">練習-遊戲</section>
    <section id="page-challenge-setup" class="page">挑戰-設定</section>
    <section id="page-challenge-game" class="page">挑戰-遊戲</section>
    <section id="page-challenge-result" class="page">挑戰-結算</section>
  </div>

  <script>
    // ===== Page Switching =====
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
    }
  </script>
</body>
</html>
