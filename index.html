<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Easy Go 單字王</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- ===== Home Page ===== -->
    <section id="page-home" class="page active">
      <div class="title-area">
        <h1 class="app-title">English Easy Go</h1>
        <p class="app-subtitle">單字王 挑戰賽</p>
      </div>
      <div class="card">
        <label class="input-label" for="player-name">你的名字</label>
        <input type="text" id="player-name" class="game-input" placeholder="輸入玩家名稱..." maxlength="20">
        <div style="display:flex; gap:10px; margin-top:16px">
          <button class="btn btn-primary" style="flex:1" onclick="startPractice()">練習模式</button>
          <button class="btn btn-accent" style="flex:1" onclick="startChallenge()">挑戰模式</button>
        </div>
      </div>
    </section>

    <!-- ===== Deck Selection Page ===== -->
    <section id="page-deck-select" class="page">
      <button class="btn btn-back" onclick="showPage('page-home')">← 回首頁</button>
      <h2 class="page-title">選擇題庫</h2>
      <div id="deck-list" class="deck-list"></div>

      <div class="section-divider">或上傳自訂題庫</div>

      <div class="csv-upload-section">
        <h3>上傳 CSV 檔案</h3>
        <p>格式：每行一組 <code>英文,中文</code></p>
        <input type="text" id="csv-deck-name" placeholder="題庫名稱（必填）">
        <br>
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('csv-file-input').click()">選擇 CSV 檔案</button>
        <input type="file" id="csv-file-input" accept=".csv,.txt" onchange="handleCSVUpload(event)">
        <div id="csv-preview" style="margin-top:12px"></div>
      </div>
    </section>

    <!-- ===== Practice Word Selection Page ===== -->
    <section id="page-practice-select" class="page">
      <button class="btn btn-back" onclick="showPage('page-deck-select')">← 回題庫選擇</button>
      <h2 class="page-title">選擇練習單字</h2>
      <div class="select-search">
        <input type="text" id="word-search" class="game-input" placeholder="搜尋單字..." oninput="filterWords()">
      </div>
      <div id="letter-nav" class="select-letters"></div>
      <div class="select-actions">
        <button class="btn btn-xs" onclick="selectAllWords()">全選</button>
        <button class="btn btn-xs" onclick="deselectAllWords()">全不選</button>
        <span id="selected-count" class="badge" style="margin-left:auto"></span>
      </div>
      <div id="word-list" class="select-list"></div>
      <div style="margin-top:12px; text-align:center">
        <button class="btn btn-primary" onclick="confirmSelection()">確認選擇，開始練習 →</button>
      </div>
    </section>

    <!-- ===== Practice Type Selection Page ===== -->
    <section id="page-practice-type" class="page">
      <button class="btn btn-back" onclick="showPage('page-practice-select')">← 回單字選擇</button>
      <h2 class="page-title">選擇題型</h2>
      <div id="type-cards" class="type-cards"></div>
      <div style="margin-top:16px; text-align:center">
        <button class="btn btn-outline btn-sm" onclick="resetPracticeProgress()">重置練習進度</button>
      </div>
    </section>

    <!-- ===== Game Page (shared by Practice & Challenge) ===== -->
    <section id="page-practice-game" class="page">
      <div class="game-header">
        <button class="btn btn-back btn-sm" onclick="exitGame()">✕ 離開</button>
        <div class="game-progress">
          <span id="game-progress-text"></span>
          <span id="game-remaining" class="badge"></span>
        </div>
        <div class="progress-bar"><div id="game-progress-bar" class="progress-fill"></div></div>
      </div>
      <div class="card game-card">
        <div id="game-question" class="game-question"></div>
        <div id="game-answer" class="game-answer"></div>
        <div id="game-feedback" class="game-feedback"></div>
        <div id="game-actions" class="game-actions"></div>
      </div>
    </section>

    <!-- ===== Challenge Setup Page ===== -->
    <section id="page-challenge-setup" class="page">
      <button class="btn btn-back" onclick="showPage('page-deck-select')">← 回題庫選擇</button>
      <h2 class="page-title">挑戰模式設定</h2>
      <div class="card">
        <h3 style="margin-bottom:12px">題型</h3>
        <div id="challenge-type-options" class="option-group">
          <button class="btn-option active" data-type="zh2en" onclick="selectChallengeType('zh2en')">✏️ 中翻英</button>
          <button class="btn-option" data-type="en2zh" onclick="selectChallengeType('en2zh')">📝 英翻中</button>
          <button class="btn-option" data-type="choice" onclick="selectChallengeType('choice')">🔤 選擇題</button>
        </div>
        <h3 style="margin:16px 0 12px">題數</h3>
        <div id="challenge-count-options" class="option-group">
          <button class="btn-option" data-count="10" onclick="selectChallengeCount(10)">10 題</button>
          <button class="btn-option active" data-count="20" onclick="selectChallengeCount(20)">20 題</button>
          <button class="btn-option" data-count="30" onclick="selectChallengeCount(30)">30 題</button>
        </div>
        <button class="btn btn-accent" style="width:100%; margin-top:20px" onclick="startChallengeGame()">開始挑戰！</button>
      </div>
    </section>

    <!-- ===== Challenge Result Page ===== -->
    <section id="page-challenge-result" class="page">
      <div class="card" style="text-align:center">
        <h2>挑戰結束！</h2>
        <div class="result-score">
          <span id="result-score" class="big-score"></span>
        </div>
        <p id="result-rate" class="result-rate"></p>
      </div>
      <div class="card">
        <h3>排行榜</h3>
        <table id="leaderboard-table" class="leaderboard"></table>
      </div>
      <div style="text-align:center; margin-top:16px">
        <button class="btn btn-primary" onclick="startChallengeGame()">再玩一次</button>
        <button class="btn btn-secondary" onclick="showPage('page-home')">回首頁</button>
      </div>
    </section>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
