<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>國中小英文單字王</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=LXGW+WenKai+TC:wght@400;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="retro-grid" aria-hidden="true">
    <div class="retro-grid-plane">
      <div class="retro-grid-lines"></div>
    </div>
    <div class="retro-grid-fade"></div>
  </div>
  <div id="app">
    <!-- ===== Home Page ===== -->
    <section id="page-home" class="page active">
      <div class="title-area">
        <h1 class="app-title">國中小英文單字王</h1>
      </div>
      <div class="card home-card">
        <div id="player-name-display" class="player-name-display" style="display:none">
          <span id="player-name-text" style="font-size:var(--font-size-lg); font-weight:800; color:var(--text-primary)"></span>
          <button class="btn-edit-name" onclick="editPlayerName()" title="編輯名字">✎</button>
        </div>
        <div id="player-name-edit">
          <label class="input-label" for="player-name" style="text-align:center">你的名字</label>
          <div style="display:flex; gap:8px; align-items:center">
            <input type="text" id="player-name" class="game-input" placeholder="輸入玩家名稱..." maxlength="20" style="text-align:center; flex:1">
            <button class="btn-confirm-name" id="btn-confirm-name" onclick="confirmPlayerName()" style="display:none" title="確認">✓</button>
          </div>
        </div>

        <div class="deck-info-bar" id="home-deck-info" onclick="goToDeckSelect()">
          <span id="home-deck-icon" style="font-size:2rem">📚</span>
          <div style="flex:1; text-align:center">
            <div id="home-deck-name" class="deck-info-name">尚未選擇題庫</div>
            <div id="home-deck-stats" class="deck-info-stats">點擊選擇題庫</div>
          </div>
          <span style="color:var(--text-muted); font-size:1.2rem">▶</span>
        </div>

        <div id="home-leaderboard" class="home-leaderboard" style="display:none"></div>

        <div style="display:flex; gap:10px; margin-top:16px">
          <button class="btn btn-primary" style="flex:1" onclick="startPractice()">練習模式</button>
          <button class="btn btn-accent" style="flex:1" onclick="startChallenge()">計時挑戰賽</button>
        </div>
      </div>
      <div class="stats-bar" id="home-stats"></div>
      <button class="btn btn-secondary" style="width:100%; margin-top:10px" onclick="goToMasteredWords()">已記單字</button>
    </section>

    <!-- ===== Deck Selection Page ===== -->
    <section id="page-deck-select" class="page">
      <div class="page-header">
        <button class="btn-icon-back" onclick="backFromDeckSelect()">←</button>
        <h2 class="page-header-title">選擇題庫</h2>
      </div>

      <div class="card">
        <div class="level-toggle" id="level-toggle">
          <button class="level-btn active" data-level="elementary" onclick="switchLevel('elementary')">國小</button>
          <button class="level-btn" data-level="junior" onclick="switchLevel('junior')">國中</button>
          <button class="level-btn" data-level="custom" onclick="switchLevel('custom')">自訂</button>
        </div>

        <div id="deck-dropdown-area" style="margin-top:16px">
          <select id="deck-dropdown" class="game-input" onchange="onDeckDropdownChange()" style="width:100%; cursor:pointer">
            <option value="">-- 請選擇題庫 --</option>
          </select>
          <div id="deck-detail" style="margin-top:12px; font-size:0.9rem; color:var(--text-muted)"></div>
        </div>

        <div id="custom-upload-area" style="display:none; margin-top:16px">
          <div id="custom-deck-list" style="margin-bottom:12px"></div>
          <div class="section-divider">上傳新題庫</div>
          <div style="text-align:center">
            <input type="text" id="csv-deck-name" class="game-input" placeholder="題庫名稱（必填）" style="margin-bottom:8px">
            <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:8px">格式：每行一組 <code>英文,中文</code></p>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('csv-file-input').click()">選擇 CSV 檔案</button>
            <input type="file" id="csv-file-input" accept=".csv,.txt" onchange="handleCSVUpload(event)" style="display:none">
            <div id="csv-preview" style="margin-top:12px"></div>
          </div>
        </div>

        <button class="btn btn-primary" id="confirm-deck-btn" style="width:100%; margin-top:16px; display:none" onclick="confirmDeckSelection()">確認選擇</button>
      </div>
    </section>

    <!-- ===== Practice Word Selection Page ===== -->
    <section id="page-practice-select" class="page">
      <div class="page-header">
        <button class="btn-icon-back" onclick="showPage('page-home')">←</button>
        <h2 class="page-header-title">選擇練習單字</h2>
      </div>
      <div class="select-search">
        <input type="text" id="word-search" class="game-input" placeholder="搜尋單字..." oninput="filterWords()">
      </div>
      <div id="letter-nav" class="select-letters"></div>
      <div class="select-actions">
        <label class="check-all-label">
          <input type="checkbox" id="check-all" onchange="toggleAllWords(this.checked)">
          <span>全選</span>
        </label>
        <span id="selected-count" class="badge" style="margin-left:auto"></span>
      </div>
      <div id="word-list" class="select-list"></div>
      <div style="margin-top:12px; text-align:center">
        <button class="btn btn-primary" onclick="confirmSelection()">確認選擇，開始練習 →</button>
      </div>
    </section>

    <!-- ===== Practice Type Selection Page ===== -->
    <section id="page-practice-type" class="page">
      <div class="page-header">
        <button class="btn-icon-back" onclick="showPage('page-practice-select')">←</button>
        <h2 class="page-header-title">選擇題型</h2>
      </div>
      <div id="type-cards" class="type-cards"></div>
    </section>

    <!-- ===== Game Page (shared by Practice & Challenge) ===== -->
    <section id="page-practice-game" class="page">
      <div class="game-header">
        <div class="game-header-top">
          <button class="btn-icon-back" onclick="exitGame()">✕</button>
          <div id="game-timer" class="game-timer" style="display:none"></div>
          <div style="width:40px"></div>
        </div>
        <div class="game-progress">
          <span id="game-progress-text"></span>
          <span id="game-remaining"></span>
        </div>
        <div class="progress-bar"><div id="game-progress-bar" class="progress-fill"></div></div>
      </div>
      <div class="card game-card">
        <div id="game-question" class="game-question"></div>
        <div id="game-answer" class="game-answer"></div>
        <div id="game-feedback" class="game-feedback"></div>
        <div id="game-actions" class="game-actions"></div>
      </div>
    </section>

    <!-- ===== Challenge Setup Page ===== -->
    <section id="page-challenge-setup" class="page">
      <div class="page-header">
        <button class="btn-icon-back" onclick="showPage('page-home')">←</button>
        <h2 class="page-header-title">計時挑戰設定</h2>
      </div>
      <div class="card">
        <h3 style="margin-bottom:12px">題型（可多選）</h3>
        <div id="challenge-type-options" class="option-group">
          <button class="btn-option active" data-type="zh2en" onclick="toggleChallengeType('zh2en')">✏️ 中翻英</button>
          <button class="btn-option" data-type="en2zh" onclick="toggleChallengeType('en2zh')">📝 英翻中</button>
        </div>
        <h3 style="margin:16px 0 12px">時間</h3>
        <div id="challenge-time-options" class="option-group">
          <button class="btn-option active" data-time="180" onclick="selectChallengeTime(180)">3 分鐘</button>
          <button class="btn-option" data-time="300" onclick="selectChallengeTime(300)">5 分鐘</button>
        </div>
        <p style="margin-top:12px; font-size:var(--font-size-sm); color:var(--text-muted); text-align:center">每答對一題得 10 分，限時內盡量拿高分！</p>
        <button class="btn btn-accent" style="width:100%; margin-top:16px" onclick="startChallengeGame()">開始挑戰！</button>
      </div>
    </section>

    <!-- ===== Leaderboard Page ===== -->
    <section id="page-leaderboard" class="page">
      <div class="page-header">
        <button class="btn-icon-back" onclick="showPage('page-home')">←</button>
        <h2 class="page-header-title">排行榜</h2>
      </div>
      <div class="card">
        <select id="lb-deck-select" class="game-input" onchange="renderLeaderboardPage()" style="width:100%; cursor:pointer"></select>
        <div class="lb-time-toggle" style="margin-top:12px">
          <button class="btn-option active" data-lb-time="180" onclick="selectLbTime(180)">3 分鐘</button>
          <button class="btn-option" data-lb-time="300" onclick="selectLbTime(300)">5 分鐘</button>
        </div>
        <table id="lb-table" class="leaderboard" style="margin-top:16px"></table>
        <p id="lb-empty" style="text-align:center; color:var(--text-muted); margin-top:16px; display:none">尚無紀錄</p>
      </div>
    </section>

    <!-- ===== Mastered Words Page ===== -->
    <section id="page-mastered" class="page">
      <div class="page-header">
        <button class="btn-icon-back" onclick="showPage('page-home')">←</button>
        <h2 class="page-header-title">已記單字</h2>
      </div>
      <div class="card">
        <div id="mastered-summary" style="text-align:center; margin-bottom:16px; color:var(--text-muted); font-size:var(--font-size-sm)"></div>
        <input type="text" id="mastered-search" class="game-input" placeholder="搜尋單字..." oninput="filterMasteredWords()" style="margin-bottom:12px">
        <div id="mastered-list" class="select-list"></div>
        <p id="mastered-empty" style="text-align:center; color:var(--text-muted); margin-top:16px; display:none">尚無已記單字</p>
      </div>
    </section>

    <!-- ===== Challenge Result Page ===== -->
    <section id="page-challenge-result" class="page">
      <div class="card" style="text-align:center">
        <h2>時間到！</h2>
        <div class="result-score">
          <span id="result-score" class="big-score"></span>
        </div>
        <p id="result-rate" class="result-rate"></p>
      </div>
      <div class="card">
        <h3>排行榜</h3>
        <table id="leaderboard-table" class="leaderboard"></table>
      </div>
      <div style="text-align:center; margin-top:16px">
        <button class="btn btn-primary" onclick="startChallengeGame()">再玩一次</button>
        <button class="btn btn-secondary" onclick="showPage('page-home')">回首頁</button>
      </div>
    </section>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
